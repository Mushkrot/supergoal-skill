    - Prose and visible labels in the docs language (SKILL.md); set <html lang> to that language

-->

    :root {
      color-scheme: light dark;
      --bg: #ffffff; --surface: #f5f6f8; --border: #d8dce2;
      --text: #1b1f24; --muted: #586069; --accent: #2f6feb;
      --strong-bg: #e6f4ea; --strong-fg: #1a7f37;
      --worth-bg: #e8f0fe; --worth-fg: #1b4fc4;
      --spec-bg: #f1f0f4; --spec-fg: #6e5494;
      --warn-bg: #fff4e5; --warn-fg: #9a6700;
      --code-bg: #f0f1f3;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117; --surface: #161b22; --border: #30363d;
        --text: #e6edf3; --muted: #9da7b3; --accent: #6ea8ff;
        --strong-bg: #11271a; --strong-fg: #56d364;
        --worth-bg: #12203f; --worth-fg: #6ea8ff;
        --spec-bg: #221c2e; --spec-fg: #c7a8ff;
        --warn-bg: #2b2111; --warn-fg: #e3b341;
        --code-bg: #1c2128;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 17px/1.72 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px 96px; }
    header.page { border-bottom: 1px solid var(--border); padding: 32px 0 20px; }
    header.page h1 { margin: 0 0 4px; font-size: 36px; line-height: 1.2; }
    header.page p.lede { margin: 0; color: var(--muted); max-width: 64ch; }
    .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center; margin: 18px 0 8px; font-size: 14px; color: var(--muted); }
    h2 { font-size: 25px; border-bottom: 1px solid var(--border); padding-bottom: 6px; margin: 40px 0 16px; }
    p, li { max-width: 72ch; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: var(--code-bg); border-radius: 4px; padding: 1px 5px; font-size: 14px; }
    .badge { display: inline-block; font-size: 13px; font-weight: 700; letter-spacing: .02em; padding: 2px 9px; border-radius: 999px; white-space: nowrap; }
    .badge.strong { background: var(--strong-bg); color: var(--strong-fg); }
    .badge.worth { background: var(--worth-bg); color: var(--worth-fg); }
    .badge.speculative { background: var(--spec-bg); color: var(--spec-fg); }
    .candidate { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; margin: 16px 0; }
    .candidate > header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
    .candidate h3 { margin: 0; font-size: 21px; }
    .candidate .files { color: var(--muted); font-size: 14px; margin: 0 0 12px; }
    .candidate dl { display: grid; grid-template-columns: minmax(96px, auto) 1fr; gap: 6px 16px; margin: 0; }
    .candidate dt { font-weight: 600; color: var(--muted); }
    .candidate dd { margin: 0; }
    .candidate.conflict { border-color: var(--warn-fg); }
    .callout { background: var(--warn-bg); color: var(--warn-fg); border-radius: 6px; padding: 8px 12px; font-size: 15px; margin: 12px 0 0; }
    /* before/after: inline CSS boxes, no CDN */
    .ba { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin: 14px 0 2px; }
    .ba .col { border: 1px dashed var(--border); border-radius: 8px; padding: 10px; }
    .ba .col h4 { margin: 0 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
    .ba .mod { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 8px; margin: 6px 0; font-size: 15px; }
    .ba .mod.deep { border-color: var(--strong-fg); }
    .ba .arrow { color: var(--accent); font-weight: 700; font-size: 1.4rem; text-align: center; }
    .top { background: var(--strong-bg); color: var(--strong-fg); border-radius: 10px; padding: 16px 20px; }
    .top h2 { border: 0; margin: 0 0 8px; color: inherit; }
    .notcovered { color: var(--muted); }
    @media (max-width: 768px) {
      .wrap { padding: 0 16px 64px; }
      .ba { grid-template-columns: 1fr; }
      .ba .arrow { transform: rotate(90deg); }
      .candidate dl { grid-template-columns: 1fr; gap: 2px; }
    }
  </style>
</head>
